name: playbook365
description: Club Management App — Playbook365

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.0
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  flutter_svg: ^2.2.4

  # UI helpers
  # cached_network_image: ^3.3.0
  # shimmer: ^3.0.0

  # Utils
  # intl: ^0.19.0
  # url_launcher: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - config/env.dev.json
    - config/env.staging.json
    - config/env.prod.json
    - assets/svgs/

